    <pattern id="crimson-suits" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <text x="12" y="16" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="15" text-anchor="middle" fill="rgba(248,113,113,0.45)">♥</text>
      <text x="12" y="8" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="11" text-anchor="middle" fill="rgba(248,250,252,0.12)">♣</text>
