  <rect x="8" y="8" width="184" height="264" rx="18" fill="#0a0a0a" opacity="0.7" />
  <rect x="12" y="12" width="176" height="256" rx="14" fill="url(#crimson)" stroke="#facc15" stroke-width="2" />
